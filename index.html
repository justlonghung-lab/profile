<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LH Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <canvas id="fw-canvas"></canvas>
  <div class="geo-layer" id="geoLayer"></div>

  <div class="scene" id="scene">
    <div class="card-frame">
      <div class="card" id="card">
        <div class="card-gloss"></div>

        <div class="avatar-block">
          <div class="avatar-orbit">
            <div class="orbit-dot"></div>
          </div>

          <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <img src="avatar.jpg" alt="Nông Long Hưng" class="avatar" />
            <div class="avatar-sweep"></div>
          </div>
        </div>

        <div class="info">
          <h1 class="name">Nông Long Hưng</h1>
          <p class="job-title">MEDIA CREATOR</p>
          <p class="bio">"cá chép chính là tàu ngầm<br>chuồn chuồn chính là máy bay."</p>
        </div>

        <div class="social-links">
          <a href="https://www.behance.net/justlonghung" target="_blank" class="social-btn be">
            <span>Behance</span>
          </a>
          <a href="https://www.instagram.com/justlonghung/" target="_blank" class="social-btn ig">
            <span>Instagram</span>
          </a>
          <a href="https://www.facebook.com/justlonghung/" target="_blank" class="social-btn fb">
            <span>Facebook</span>
          </a>
          <a href="http://zalo.me/0378768331" target="_blank" class="social-btn zl">
            <span>Zalo</span>
          </a>
        </div>

        <div class="action-row">
          <button class="fund-btn" id="fundBtn" type="button">
            <span class="fund-icon">💸</span>
            <span class="fund-text">Tặng Quà</span>
            <span class="fund-pulse"></span>
          </button>

          <button class="fund-btn game-trigger" id="gameBtn" type="button">
            <span class="fund-icon">🎮</span>
            <span class="fund-text">Mini Game</span>
            <span class="fund-pulse"></span>
          </button>
        </div>

        <div class="confess-wrap">
          <div class="confess-card" id="confessCard">
            <div class="confess-title">LỜI NHẮN</div>

            <form class="confess-form" id="confessForm">
              <label class="confess-label" for="confessName">Họ Tên</label>
              <input
                class="confess-input"
                id="confessName"
                name="name"
                type="text"
                placeholder="Điền họ tên của bạn"
                maxlength="60"
                required
              />

              <label class="confess-label" for="confessMessage">Lời Nhắn</label>
              <textarea
                class="confess-textarea"
                id="confessMessage"
                name="message"
                placeholder="Viết gì đó tử tế hoặc đáng ngại cũng được"
                maxlength="500"
                required
              ></textarea>

              <button class="confess-btn" id="confessSubmit" type="submit">
                Gửi lời nhắn
              </button>

              <div class="confess-status" id="confessStatus"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="game-modal" id="gameModal" aria-hidden="true">
    <div class="game-panel">
      <button class="game-close" id="gameClose" type="button">✕</button>

      <div class="game-head">
        <div class="game-title">Mini Game Hứng Tiền</div>

        <div class="game-head-right">
          <div class="game-timer-wrap">
            <span>Thời gian:</span>
            <strong id="gameTimer">15</strong>
          </div>

          <div class="game-score-wrap">
            <span>Điểm:</span>
            <strong id="gameScore">0</strong>
          </div>
        </div>
      </div>

      <div class="game-stage" id="gameStage">
        <div class="game-hud">Di chuột để hứng tiền, né bom</div>

        <img
          src="phule.png"
          alt="Nhân vật game"
          class="game-player"
          id="gamePlayer"
          data-normal="phule.png"
          data-hurt="phuledau.png"
        />

        <div class="game-result" id="gameResult">
          <div class="game-result-card">
            <div class="game-result-title">Hết giờ</div>

            <div class="game-result-score-row">
              <img src="phulediem.png" alt="Điểm số" class="game-result-avatar" />
              <div class="game-result-score-block">
                <div class="game-result-score-label">Điểm của bạn</div>
                <div class="game-result-score-value">
                  <strong id="gameFinalScore">0</strong>
                </div>
              </div>
            </div>

            <button class="game-restart" id="gameRestart" type="button">Chơi lại</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
